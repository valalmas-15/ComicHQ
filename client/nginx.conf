# Nginx configuration for the client service
server {
    listen 80;
    server_name localhost;

    # Root directory for serving static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve static files and handle client-side routing (for SPAs)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    location /api/ {
        proxy_pass http://server:3000/api/; # 'server' is the name of the backend service in docker-compose
    }
}