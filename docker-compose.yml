services:
  server:
    build: ./server
    container_name: comichq_server
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app/server
      # Baris di bawah ini adalah "KUNCI": Mengisolasi node_modules
      - /app/server/node_modules 
    deploy:
      resources:
        limits:
          memory: 256M

  client:
    build: ./client
    container_name: comichq_client
    restart: always
    # Kita bersihkan command-nya jadi standar saja
    command: npm run dev -- --host 0.0.0.0 --port 3001
    ports:
      - "3001:3001"
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
    depends_on:
      - server