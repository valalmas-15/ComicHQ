services:
  # 1. BACKEND: Node.js API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: comichq_server
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    # Menghapus volumes development agar RAM 4GB lebih enteng
    # volumes:
    #   - ./server:/app/server

  # 2. FRONTEND: React/Vite + Nginx
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/"
    container_name: comichq_client
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - server
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # 3. TUNNEL: Cloudflare Quick Tunnel (Gratisan)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: always
    # Menghubungkan tunnel ke port 3001 (Frontend)
    command: tunnel --no-autoupdate run --url http://client:3001
    depends_on:
      - client