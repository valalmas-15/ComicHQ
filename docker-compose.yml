services:
  # BACKEND: Node.js API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: comichq_server
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M  # Limit RAM agar tidak makan jatah sistem

  # FRONTEND: React/Vite + Nginx
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/" # Base path untuk API
    container_name: comichq_client
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - server
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 512M # Limit RAM 512MB (Total Docker ~1GB, sisa 3GB aman)